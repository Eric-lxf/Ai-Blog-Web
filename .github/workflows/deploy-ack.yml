name: Deploy to Alibaba Cloud ACK

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: deploy-ack-${{ github.ref }}
  cancel-in-progress: true

env:
  ACR_REGISTRY: crpi-skinyl3l0124ry6m.cn-beijing.personal.cr.aliyuncs.com
  ACR_NAMESPACE: blog_private
  BACKEND_IMAGE_NAME: ai-blog-backend
  FRONTEND_IMAGE_NAME: ai-blog-frontend
  K8S_NAMESPACE: ai-blog

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 切勿在 workflow 中写明文密码，全部放在 GitHub Secrets
      - name: Login to Alibaba Cloud ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }}
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.BACKEND_IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }}
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.FRONTEND_IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      # 方式 A（推荐）：把 ACK 集群 kubeconfig 内容 base64 后存入 Secret ACK_KUBECONFIG
      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.ACK_KUBECONFIG }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          kubectl cluster-info

      # 若使用阿里云 RAM AccessKey，可改用官方 Action（需额外 Secrets）：
      # - uses: aliyun/ack-set-context@v1
      #   with:
      #     access-key-id: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
      #     access-key-secret: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
      #     cluster-id: ${{ secrets.ACK_CLUSTER_ID }}
      #     region-id: cn-beijing

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f deploy/k8s/namespace.yaml
          kubectl apply -f deploy/k8s/backend.yaml
          kubectl apply -f deploy/k8s/frontend.yaml

      - name: Rollout new images
        run: |
          BACKEND_IMAGE="${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }}"
          FRONTEND_IMAGE="${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }}"

          kubectl set image deployment/ai-blog-backend \
            backend="$BACKEND_IMAGE" \
            -n ${{ env.K8S_NAMESPACE }}

          kubectl set image deployment/ai-blog-frontend \
            frontend="$FRONTEND_IMAGE" \
            -n ${{ env.K8S_NAMESPACE }}

          kubectl rollout status deployment/ai-blog-backend -n ${{ env.K8S_NAMESPACE }} --timeout=300s
          kubectl rollout status deployment/ai-blog-frontend -n ${{ env.K8S_NAMESPACE }} --timeout=180s
