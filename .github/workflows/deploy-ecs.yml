name: Build, Push and Deploy to ECS

on:
  push:
    branches:
      - master
  workflow_dispatch:

# 生产部署按顺序执行，避免新提交中断正在进行的部署。
concurrency:
  group: ai-blog-production-deploy
  cancel-in-progress: false

env:
  ACR_REGISTRY: crpi-skinyl3l0124ry6m.cn-beijing.personal.cr.aliyuncs.com
  ACR_NAMESPACE: blog_private
  BACKEND_IMAGE_NAME: ai-blog-backend
  FRONTEND_IMAGE_NAME: ai-blog-frontend
  ECS_DEPLOY_PATH: /opt/ai-blog

jobs:
  build-backend:
    name: Build and Push Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Validate ACR credentials
        env:
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
        run: |
          test -n "$ACR_USERNAME"
          test -n "$ACR_PASSWORD"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }}
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.BACKEND_IMAGE_NAME }}:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  build-frontend:
    name: Build and Push Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Validate ACR credentials
        env:
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
        run: |
          test -n "$ACR_USERNAME"
          test -n "$ACR_PASSWORD"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # 保持在 GitHub Runner 中构建，避免 Docker 内 Vite 构建内存不足。
      - name: Build frontend dist
        working-directory: frontend
        env:
          NODE_OPTIONS: --max-old-space-size=6144
          VITE_LOW_MEM_BUILD: "1"
          VITE_BUILD_COMPRESS: ""
        run: |
          npm ci --no-audit --no-fund
          npm run build:prod
          test -f dist/index.html

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile.release
          push: true
          no-cache: true
          tags: |
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }}
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.FRONTEND_IMAGE_NAME }}:latest

  deploy-ecs:
    name: Deploy to ECS
    needs:
      - build-backend
      - build-frontend
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read

    steps:
      - name: Checkout deployment files
        uses: actions/checkout@v4

      - name: Ensure ECS deployment directory exists
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_PRIVATE_KEY }}
          fingerprint: ${{ secrets.ECS_SSH_FINGERPRINT }}
          script_stop: true
          script: |
            mkdir -p /opt/ai-blog

      # 仅上传 Compose 文件；不上传源码、SQL、.env。
      - name: Upload Docker Compose file
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_PRIVATE_KEY }}
          fingerprint: ${{ secrets.ECS_SSH_FINGERPRINT }}
          source: "docker-compose.prod.yml"
          target: ${{ env.ECS_DEPLOY_PATH }}

      - name: Pull ACR images and deploy containers
        uses: appleboy/ssh-action@v1.2.1
        env:
          ACR_REGISTRY: ${{ env.ACR_REGISTRY }}
          ACR_NAMESPACE: ${{ env.ACR_NAMESPACE }}
          BACKEND_IMAGE_NAME: ${{ env.BACKEND_IMAGE_NAME }}
          FRONTEND_IMAGE_NAME: ${{ env.FRONTEND_IMAGE_NAME }}
          IMAGE_TAG: ${{ github.sha }}

          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}

          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}

          BLOG_OSS_KEY_ID: ${{ secrets.BLOG_OSS_KEY_ID }}
          BLOG_OSS_KEY_SECRET: ${{ secrets.BLOG_OSS_KEY_SECRET }}

          MYSQL_HOST: ${{ vars.MYSQL_HOST }}
          MYSQL_PORT: ${{ vars.MYSQL_PORT }}
          MYSQL_DATABASE: ${{ vars.MYSQL_DATABASE }}

          REDIS_HOST: ${{ vars.REDIS_HOST }}
          REDIS_PORT: ${{ vars.REDIS_PORT }}

          BLOG_OSS_ENABLED: ${{ vars.BLOG_OSS_ENABLED }}
          BLOG_OSS_BUCKET: ${{ vars.BLOG_OSS_BUCKET }}

          BACKEND_PORT: ${{ vars.BACKEND_PORT }}
          FRONTEND_PORT: ${{ vars.FRONTEND_PORT }}
          RUOYI_LOG_PATH: ${{ vars.RUOYI_LOG_PATH }}
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_PRIVATE_KEY }}
          fingerprint: ${{ secrets.ECS_SSH_FINGERPRINT }}
          script_stop: true
          envs: ACR_REGISTRY,ACR_NAMESPACE,BACKEND_IMAGE_NAME,FRONTEND_IMAGE_NAME,IMAGE_TAG,ACR_USERNAME,ACR_PASSWORD,MYSQL_USER,MYSQL_PASSWORD,REDIS_PASSWORD,BLOG_OSS_KEY_ID,BLOG_OSS_KEY_SECRET,MYSQL_HOST,MYSQL_PORT,MYSQL_DATABASE,REDIS_HOST,REDIS_PORT,BLOG_OSS_ENABLED,BLOG_OSS_BUCKET,BACKEND_PORT,FRONTEND_PORT,RUOYI_LOG_PATH
          script: |
            set -euo pipefail

            cd /opt/ai-blog

            test -f docker-compose.prod.yml
            test -n "$MYSQL_USER"
            test -n "$MYSQL_PASSWORD"
            test -n "$REDIS_PASSWORD"
            test -n "$MYSQL_HOST"
            test -n "$REDIS_HOST"
            test -n "$BLOG_OSS_KEY_ID"
            test -n "$BLOG_OSS_KEY_SECRET"

            # 每次部署都从 GitHub Secrets / Variables 重建运行配置。
            umask 077
            {
              printf 'MYSQL_HOST=%s\n' "$MYSQL_HOST"
              printf 'MYSQL_PORT=%s\n' "$MYSQL_PORT"
              printf 'MYSQL_DATABASE=%s\n' "$MYSQL_DATABASE"
              printf 'MYSQL_USER=%s\n' "$MYSQL_USER"
              printf 'MYSQL_PASSWORD=%s\n' "$MYSQL_PASSWORD"

              printf 'REDIS_HOST=%s\n' "$REDIS_HOST"
              printf 'REDIS_PORT=%s\n' "$REDIS_PORT"
              printf 'REDIS_PASSWORD=%s\n' "$REDIS_PASSWORD"

              printf 'BLOG_OSS_ENABLED=%s\n' "$BLOG_OSS_ENABLED"
              printf 'BLOG_OSS_KEY_ID=%s\n' "$BLOG_OSS_KEY_ID"
              printf 'BLOG_OSS_KEY_SECRET=%s\n' "$BLOG_OSS_KEY_SECRET"
              printf 'BLOG_OSS_BUCKET=%s\n' "$BLOG_OSS_BUCKET"

              printf 'BACKEND_PORT=%s\n' "$BACKEND_PORT"
              printf 'FRONTEND_PORT=%s\n' "$FRONTEND_PORT"
              printf 'RUOYI_LOG_PATH=%s\n' "$RUOYI_LOG_PATH"
            } > .env
            chmod 600 .env

            echo "$ACR_PASSWORD" | docker login "$ACR_REGISTRY" \
              --username "$ACR_USERNAME" \
              --password-stdin

            # 使用 commit SHA，不使用 latest，避免镜像版本错配。
            export BACKEND_IMAGE="${ACR_REGISTRY}/${ACR_NAMESPACE}/${BACKEND_IMAGE_NAME}:${IMAGE_TAG}"
            export FRONTEND_IMAGE="${ACR_REGISTRY}/${ACR_NAMESPACE}/${FRONTEND_IMAGE_NAME}:${IMAGE_TAG}"

            docker compose --env-file .env -f docker-compose.prod.yml config -q
            docker compose --env-file .env -f docker-compose.prod.yml pull backend frontend
            docker compose --env-file .env -f docker-compose.prod.yml up -d --remove-orphans

            docker image prune -f
            docker compose --env-file .env -f docker-compose.prod.yml ps

            echo "Deployment completed"
            echo "Backend:  ${BACKEND_IMAGE}"
            echo "Frontend: ${FRONTEND_IMAGE}"
