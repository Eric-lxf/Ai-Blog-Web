name: Build and Push to ACR

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: build-push-acr-${{ github.ref }}
  cancel-in-progress: true

env:
  ACR_REGISTRY: crpi-skinyl3l0124ry6m.cn-beijing.personal.cr.aliyuncs.com
  ACR_NAMESPACE: blog_private
  BACKEND_IMAGE_NAME: ai-blog-backend
  FRONTEND_IMAGE_NAME: ai-blog-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate ACR secrets
        run: |
          missing=0
          if [ -z "${{ secrets.ACR_USERNAME }}" ]; then
            echo "::error::缺少 Secret: ACR_USERNAME（阿里云 ACR 登录用户名）"
            missing=1
          fi
          if [ -z "${{ secrets.ACR_PASSWORD }}" ]; then
            echo "::error::缺少 Secret: ACR_PASSWORD（阿里云 ACR 固定密码）"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            echo ""
            echo "请到 GitHub 仓库 Settings → Secrets and variables → Actions 添加 ACR_USERNAME / ACR_PASSWORD。"
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Alibaba Cloud ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }}
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.BACKEND_IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 前端在 Runner 上构建 dist（约 7GB 内存），避免 Docker 内 Vite 1280MB 堆 OOM
      - name: Setup Node.js for frontend build
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend dist on runner
        working-directory: frontend
        env:
          NODE_OPTIONS: --max-old-space-size=6144
          VITE_LOW_MEM_BUILD: '1'
          VITE_BUILD_COMPRESS: ''
        run: |
          npm ci --no-audit --no-fund
          npm run build:prod

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile.release
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }}
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.FRONTEND_IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Server deploy hint
        run: |
          REG="${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}"
          echo "## 镜像已推送" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${REG}/${{ env.BACKEND_IMAGE_NAME }}:latest\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${REG}/${{ env.FRONTEND_IMAGE_NAME }}:latest\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "在 ECS 上更新：" >> "$GITHUB_STEP_SUMMARY"
          echo '```bash' >> "$GITHUB_STEP_SUMMARY"
          echo "docker login ${{ env.ACR_REGISTRY }}" >> "$GITHUB_STEP_SUMMARY"
          echo "cd /path/to/Ai-Blog-Web" >> "$GITHUB_STEP_SUMMARY"
          echo "docker compose -f docker-compose.prod.yml pull" >> "$GITHUB_STEP_SUMMARY"
          echo "docker compose -f docker-compose.prod.yml up -d" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
