name: Build and Push to ACR

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: build-push-acr-${{ github.ref }}
  cancel-in-progress: true

env:
  ACR_REGISTRY: crpi-skinyl3l0124ry6m.cn-beijing.personal.cr.aliyuncs.com
  ACR_NAMESPACE: blog_private
  BACKEND_IMAGE_NAME: ai-blog-backend
  FRONTEND_IMAGE_NAME: ai-blog-frontend

jobs:
  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Validate ACR secrets
        run: |
          if [ -z "${{ secrets.ACR_USERNAME }}" ] || [ -z "${{ secrets.ACR_PASSWORD }}" ]; then
            echo "::error::请配置 GitHub Secrets: ACR_USERNAME、ACR_PASSWORD"
            exit 1
          fi

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }}
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.BACKEND_IMAGE_NAME }}:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Validate ACR secrets
        run: |
          if [ -z "${{ secrets.ACR_USERNAME }}" ] || [ -z "${{ secrets.ACR_PASSWORD }}" ]; then
            echo "::error::请配置 GitHub Secrets: ACR_USERNAME、ACR_PASSWORD"
            exit 1
          fi

      # 禁止在 Docker 内跑 vite build（frontend/Dockerfile 1280MB 堆会 OOM）
      - name: Build frontend dist on runner (not inside Docker)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci and vite build
        working-directory: frontend
        env:
          NODE_OPTIONS: --max-old-space-size=6144
          VITE_LOW_MEM_BUILD: '1'
          VITE_BUILD_COMPRESS: ''
        run: |
          npm ci --no-audit --no-fund
          npm run build:prod
          test -f dist/index.html

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push frontend (Dockerfile.release — nginx only)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile.release
          push: true
          no-cache: true
          tags: |
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }}
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.FRONTEND_IMAGE_NAME }}:latest

      - name: Server deploy hint
        run: |
          REG="${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}"
          echo "## 镜像已推送" >> "$GITHUB_STEP_SUMMARY"
          echo "- Backend: \`${REG}/${{ env.BACKEND_IMAGE_NAME }}:latest\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Frontend: \`${REG}/${{ env.FRONTEND_IMAGE_NAME }}:latest\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "ECS 更新：" >> "$GITHUB_STEP_SUMMARY"
          echo '```bash' >> "$GITHUB_STEP_SUMMARY"
          echo "docker login ${{ env.ACR_REGISTRY }}" >> "$GITHUB_STEP_SUMMARY"
          echo "docker compose -f docker-compose.prod.yml pull && docker compose -f docker-compose.prod.yml up -d" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
