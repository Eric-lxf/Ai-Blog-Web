# Production: pull pre-built images from ACR.
# Runtime variables are generated by GitHub Actions into /opt/nova-mall/.env.
services:
  backend:
    image: ${BACKEND_IMAGE:?BACKEND_IMAGE is required}
    container_name: nova-mall-web-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: druid,docker

      MYSQL_HOST: ${MYSQL_HOST}
      MYSQL_PORT: ${MYSQL_PORT}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}

      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}

      NOVAMALL_OSS_ENABLED: ${NOVAMALL_OSS_ENABLED}
      NOVAMALL_OSS_KEY_ID: ${NOVAMALL_OSS_KEY_ID}
      NOVAMALL_OSS_KEY_SECRET: ${NOVAMALL_OSS_KEY_SECRET}
      NOVAMALL_OSS_BUCKET: ${NOVAMALL_OSS_BUCKET}

      RUOYI_PROFILE: /data/uploads
    volumes:
      - uploads_data:/data/uploads
      - ${RUOYI_LOG_PATH}:/home/ruoyi/logs
    ports:
      - "${BACKEND_PORT}:8080"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q --spider http://127.0.0.1:8080/actuator/health || wget -q --spider http://127.0.0.1:8080/captchaImage",
        ]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 120s

  frontend:
    image: ${FRONTEND_IMAGE:?FRONTEND_IMAGE is required}
    container_name: nova-mall-web-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      BACKEND_HOST: backend
    ports:
      - "${FRONTEND_PORT}:80"

volumes:
  uploads_data:
