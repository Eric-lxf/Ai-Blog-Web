services:
  mysql:
    image: mysql:8.0
    container_name: ai-blog-web-mysql
    restart: unless-stopped
    command:
      - --default-time-zone=+08:00
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ai_blog
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/00-init-db.sql:/docker-entrypoint-initdb.d/00-init-db.sql:ro
      - ./sql/ry_base.sql:/docker-entrypoint-initdb.d/01-ry_base.sql:ro
      - ./sql/quartz.sql:/docker-entrypoint-initdb.d/02-quartz.sql:ro
      - ./sql/blog_schema.sql:/docker-entrypoint-initdb.d/03-blog_schema.sql:ro
      - ./sql/blog_menu_seed.sql:/docker-entrypoint-initdb.d/04-blog_menu_seed.sql:ro
      - ./sql/blog_comment_schema.sql:/docker-entrypoint-initdb.d/05-blog_comment_schema.sql:ro
      - ./sql/blog_notification_schema.sql:/docker-entrypoint-initdb.d/06-blog_notification_schema.sql:ro
      - ./sql/blog_analytics_schema.sql:/docker-entrypoint-initdb.d/07-blog_analytics_schema.sql:ro
      - ./sql/wechat_schema.sql:/docker-entrypoint-initdb.d/08-wechat_schema.sql:ro
      - ./sql/wechat_menu_route_fix.sql:/docker-entrypoint-initdb.d/09-wechat_menu_route_fix.sql:ro
      - ./sql/ai_provider_schema.sql:/docker-entrypoint-initdb.d/10-ai_provider_schema.sql:ro
      - ./sql/ai_module_config_schema.sql:/docker-entrypoint-initdb.d/11-ai_module_config_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  redis:
    image: redis:7-alpine
    container_name: ai-blog-web-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ai-blog-web-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: druid,docker
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ai_blog
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RUOYI_PROFILE: /data/uploads
      JAVA_OPTS: "-Xms256m -Xmx768m -Duser.timezone=Asia/Shanghai"
    volumes:
      - uploads_data:/data/uploads
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080/actuator/health || wget -q --spider http://127.0.0.1:8080/captchaImage"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 120s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        LOW_MEM_BUILD: ${FRONTEND_LOW_MEM_BUILD:-1}
        NODE_HEAP_MB: ${FRONTEND_NODE_HEAP_MB:-1280}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
    container_name: ai-blog-web-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      BACKEND_HOST: ${BACKEND_HOST:-backend}
    ports:
      - "${FRONTEND_PORT:-80}:80"

volumes:
  mysql_data:
  redis_data:
  uploads_data:
