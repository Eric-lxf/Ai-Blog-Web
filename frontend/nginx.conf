server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Docker 内置 DNS：延迟解析 upstream，避免 backend 未就绪时 Nginx 启动失败
    resolver 127.0.0.11 valid=30s ipv6=off;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /prod-api/ {
        set $backend_host ${BACKEND_HOST};
        proxy_pass http://$backend_host:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /blog/ai/stream/ {
        set $backend_host ${BACKEND_HOST};
        proxy_pass http://$backend_host:8080/blog/ai/stream/;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_set_header Host $host;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
    }

    location /uploads/ {
        set $backend_host ${BACKEND_HOST};
        proxy_pass http://$backend_host:8080/uploads/;
    }
}
